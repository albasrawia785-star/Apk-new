name: Build Android APK (Offline Version)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files Automatically
      run: |
        unzip -o *.zip -d .
        if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
          echo "Looking for project files in subdirectories..."
          SUBDIR=$(find . -maxdepth 2 -name "app" -type d -exec dirname {} \;)
          if [ "$SUBDIR" != "." ] && [ ! -z "$SUBDIR" ]; then
            mv $SUBDIR/* . 2>/dev/null || true
          fi
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          echo "gradlew not found, creating a new wrapper..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-clean-app-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/debug/*.apk
